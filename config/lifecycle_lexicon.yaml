lifecycle_rules:
  - id: subscription_canceled
    kind: subscription_canceled
    priority: 300
    signal: token:canceled
    any:
      - pattern: subscription cancellation
      - pattern: subscription canceled
      - pattern: has been canceled
      - pattern: membership canceled
      - pattern: annulation d'abonnement
      - pattern: abonnement annul
      - pattern: cancelación de suscripción
      - pattern: cancelacion de suscripcion
      - pattern: gekündigt
      - pattern: annullamento abbonamento
      - pattern: anulering
      - pattern: anulowanie subskrypcji

  - id: subscription_renewed
    kind: subscription_renewed
    priority: 290
    signal: token:renewed
    any:
      - pattern: subscription renewed
      - pattern: auto-renew
      - pattern: renouvellement
      - pattern: renovación
      - pattern: renovacion
      - pattern: verlängert
      - pattern: verlaengert
      - pattern: rinnovo
      - pattern: verlenging
      - pattern: odnowienie

  - id: subscription_created
    kind: subscription_created
    priority: 280
    signal: token:created
    any:
      - pattern: subscription created
      - pattern: new subscription
      - pattern: welcome
      - pattern: bienvenue
      - pattern: bienvenido
      - pattern: willkommen
      - pattern: benvenuto
      - pattern: welkom
      - pattern: witamy

  - id: membership_updated
    kind: membership_updated
    priority: 270
    signal: token:membership_updated
    all_groups:
      -
        - pattern: membership
