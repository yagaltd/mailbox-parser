        - pattern: aggiornato
        - pattern: bijgewerkt
        - pattern: zaktualizowano

  - id: ticket_confirmation
    kind: ticket_confirmation
    priority: 320
    signal: token:ticket_confirmation
    any:
      - pattern: ticket confirmation
      - pattern: ticketbestätigung
      - pattern: ticketbestaetigung
      - pattern: ticketbevestiging
      - pattern: conferma biglietto
      - pattern: confirmation de billet
      - pattern: confirmación de entrada
      - pattern: confirmacion de entrada
      - pattern: potwierdzenie biletu

  - id: order_confirmation
    kind: order_confirmation
