lifecycle_rules:
  - id: subscription_canceled
    kind: subscription_canceled
    priority: 300
    signal: token:canceled
    any:
      - pattern: subscription cancellation
      - pattern: subscription canceled
      - pattern: has been canceled
      - pattern: membership canceled
      - pattern: annulation d'abonnement
      - pattern: abonnement annul
      - pattern: cancelación de suscripción
      - pattern: cancelacion de suscripcion
      - pattern: gekündigt
      - pattern: annullamento abbonamento
      - pattern: anulering
      - pattern: anulowanie subskrypcji

  - id: subscription_renewed
    kind: subscription_renewed
    priority: 290
    signal: token:renewed
    any:
      - pattern: subscription renewed
      - pattern: auto-renew
      - pattern: renouvellement
      - pattern: renovación
      - pattern: renovacion
      - pattern: verlängert
      - pattern: verlaengert
      - pattern: rinnovo
      - pattern: verlenging
      - pattern: odnowienie

  - id: subscription_created
    kind: subscription_created
    priority: 280
    signal: token:created
    any:
      - pattern: subscription created
      - pattern: new subscription
      - pattern: welcome
      - pattern: bienvenue
      - pattern: bienvenido
      - pattern: willkommen
      - pattern: benvenuto
      - pattern: welkom
      - pattern: witamy

  - id: membership_updated
    kind: membership_updated
    priority: 270
    signal: token:membership_updated
    all_groups:
      -
        - pattern: membership
        - pattern: mitgliedschaft
        - pattern: adhésion
        - pattern: afiliación
        - pattern: iscrizione
      -
        - pattern: updated
        - pattern: changed
        - pattern: plan
        - pattern: mis à jour
        - pattern: actualizado
        - pattern: aktualisiert
        - pattern: aggiornato
        - pattern: bijgewerkt
        - pattern: zaktualizowano

  - id: ticket_confirmation
    kind: ticket_confirmation
    priority: 320
    signal: token:ticket_confirmation
    any:
      - pattern: ticket confirmation
      - pattern: ticketbestätigung
      - pattern: ticketbestaetigung
      - pattern: ticketbevestiging
      - pattern: conferma biglietto
      - pattern: confirmation de billet
      - pattern: confirmación de entrada
      - pattern: confirmacion de entrada
      - pattern: potwierdzenie biletu

  - id: order_confirmation
    kind: order_confirmation
    priority: 310
    signal: token:order_confirmation
    any:
      - pattern: order confirmation
      - pattern: bestellbestätigung
      - pattern: bestellbestaetigung
      - pattern: bestelbevestiging
      - pattern: conferma ordine
      - pattern: confirmation de commande
      - pattern: confirmación de pedido
      - pattern: confirmacion de pedido
      - pattern: potwierdzenie zamówienia
      - pattern: potwierdzenie zamowienia

  - id: billing_notice
    kind: billing_notice
    priority: 100
    signal: token:billing_notice
    any:
      - pattern: invoice
      - pattern: payment
      - pattern: charged
      - pattern: billing
      - pattern: facture
      - pattern: facturación
      - pattern: facturacion
      - pattern: factura
      - pattern: rechnung
      - pattern: abrechnung
      - pattern: fattura
      - pattern: factuur
      - pattern: faktura

